services:
  db:
    image: postgres:16
    container_name: therapist_matcher_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: therapist_matcher
    ports:
      - "5432:5432"
    volumes:
      - therapist_matcher_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: therapist_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  dozzle:
    image: amir20/dozzle:latest
    container_name: therapist_dozzle
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  therapist_matcher_pgdata: